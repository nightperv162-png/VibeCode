        function modifiedAttackDamage(config, currentState) {
          const dragon = getSelectedDragon(config, currentState);
          const power = 1 + currentState.upgrades.power * config.progression.powerPerRank;
          return Math.round(config.baseAttackDamage * dragon.modifiers.attackDamage * power);

          const dragon = getSelectedDragon(config, currentState);
          const upgradedDuration = config.baseDefenceTime + currentState.upgrades.guard * config.progression.guardDurationPerRank;
          return upgradedDuration * dragon.modifiers.defenceDuration;
        }

        function modifiedSkillCooldown(config, currentState) {
          const dragon = getSelectedDragon(config, currentState);
          return config.ultimateCd * dragon.modifiers.skillCooldown * getFocusMultiplier(config, currentState);
        }

        function getFocusMultiplier(config, currentState) {
          return Math.max(config.progression.focusMultiplierFloor, 1 - currentState.upgrades.focus * config.progression.focusPerRank);
        }

        function modifiedUltimateDamage(config, currentState) {
          const power = 1 + currentState.upgrades.power * config.progression.powerPerRank;
          return Math.round(config.ultimateDamage * power);

        function getPlayerMaxHp(config, currentState) {
          return config.maxHp + currentState.upgrades.vitality * config.progression.vitalityHpPerRank;
        }

        function getEnemyStats(config, currentState) {
          const stageIndex = Math.max(0, currentState.stage - 1);
          const roster = config.progression.enemyRoster;
          const template = roster[stageIndex % roster.length];
          const cycle = Math.floor(stageIndex / roster.length);
          return {
            ...template,
            name: cycle > 0 ? `${template.name} +${cycle}` : template.name,
            maxHp: config.maxHp + stageIndex * config.progression.enemyHpPerStage,
            damage: config.enemyDamage + stageIndex * config.progression.enemyDamagePerStage,
            minWait: Math.max(config.progression.enemyMinWaitFloor, config.enemyMinWait - stageIndex * config.progression.enemyMinWaitStep),
            maxWait: Math.max(config.progression.enemyMaxWaitFloor, config.enemyMaxWait - stageIndex * config.progression.enemyMaxWaitStep),
            scale: Math.min(1.28, 1 + stageIndex * 0.025)
          };
        }

          const upgrade = getUpgrade(config, upgradeId);
          return Boolean(upgrade && currentState.upgrades[upgradeId] < upgrade.maxRank);

        function allUpgradesMaxed(config, currentState) {
          return Object.keys(config.progression.upgrades).every((upgradeId) => !canApplyUpgrade(config, currentState, upgradeId));

        function removeConnectedLightBackground(imageData, width, height, settings) {
          const data = imageData.data;
          const total = width * height;
          const visited = new Uint8Array(total);
          const queue = new Int32Array(total);
          let head = 0;
          let tail = 0;

          const isBackground = (pixelIndex) => {
            const offset = pixelIndex * 4;
            const r = data[offset];
            const g = data[offset + 1];
            const b = data[offset + 2];
            return Math.min(r, g, b) >= settings.minLight && Math.max(r, g, b) - Math.min(r, g, b) <= settings.maxSpread;
          };
          const visit = (pixelIndex) => {
            if (visited[pixelIndex] || !isBackground(pixelIndex)) return;
            visited[pixelIndex] = 1;
            queue[tail] = pixelIndex;
            tail += 1;
          };

          for (let x = 0; x < width; x += 1) {
            visit(x);
            visit((height - 1) * width + x);
          }
          for (let y = 1; y < height - 1; y += 1) {
            visit(y * width);
            visit(y * width + width - 1);
          }
          while (head < tail) {
            const pixelIndex = queue[head];
            head += 1;
            const x = pixelIndex % width;
            const y = Math.floor(pixelIndex / width);
            data[pixelIndex * 4 + 3] = 0;
            if (x > 0) visit(pixelIndex - 1);
            if (x < width - 1) visit(pixelIndex + 1);
            if (y > 0) visit(pixelIndex - width);
            if (y < height - 1) visit(pixelIndex + width);
          }

          let minX = width;
          let minY = height;
          let maxX = -1;
          let maxY = -1;
          for (let pixelIndex = 0; pixelIndex < total; pixelIndex += 1) {
            if (data[pixelIndex * 4 + 3] === 0) continue;
            const x = pixelIndex % width;
            const y = Math.floor(pixelIndex / width);
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
          }
          return { minX, minY, maxX, maxY, removed: tail };
        }

        function prepareProjectileImage(image, settings) {
          const source = document.createElement("canvas");
          source.width = image.naturalWidth;
          source.height = image.naturalHeight;
          const sourceCtx = source.getContext("2d", { willReadFrequently: true });
          sourceCtx.drawImage(image, 0, 0);
          const imageData = sourceCtx.getImageData(0, 0, source.width, source.height);
          const bounds = removeConnectedLightBackground(imageData, source.width, source.height, settings);
          if (bounds.removed < source.width * source.height * 0.1 || bounds.maxX < bounds.minX || bounds.maxY < bounds.minY) {
            throw new Error("Projectile background could not be isolated safely.");
          }

          const minX = Math.max(0, bounds.minX - settings.cropPadding);
          const minY = Math.max(0, bounds.minY - settings.cropPadding);
          const maxX = Math.min(source.width - 1, bounds.maxX + settings.cropPadding);
          const maxY = Math.min(source.height - 1, bounds.maxY + settings.cropPadding);
          const output = document.createElement("canvas");
          output.width = maxX - minX + 1;
          output.height = maxY - minY + 1;
          output.getContext("2d").putImageData(imageData, -minX, -minY);
          return output;
        }

        function isPngProjectileAsset(assetKey) {
          return Object.values(cfg.projectiles.profiles).some((profile) => profile.assetKey === assetKey);

          const image = new Image();
          image.onload = () => {
            log("asset_loaded", { key, src });
            if (!isPngProjectileAsset(key)) return;
            try {
              projectileImages[key] = prepareProjectileImage(image, cfg.projectiles.backgroundRemoval);
              log("projectile_processed", { key, width: projectileImages[key].width, height: projectileImages[key].height });
            } catch (error) {
              projectileImages[key] = null;
              log("projectile_processing_failed", { key, message: error.message });
            }
          };
          image.onerror = () => log("asset_failed", { key, src });
          image.src = src;
          images[key] = image;
        }

        function initializeCombatCooldowns() {
          state.cd.attack = cfg.combatStart.cooldowns.attack;
          state.cd.defence = cfg.combatStart.cooldowns.defence;
          state.cd.block = cfg.combatStart.cooldowns.block;
          state.cd.ultimate = cfg.combatStart.ultimateOnFullCooldown
            ? core.getCommandCooldown(cfg, state, "ultimate")
            : 0;
        }

        function reset() {
          clearVoiceCommandQueue();
          const playerMaxHp = core.getPlayerMaxHp(cfg, state);
          const enemy = core.getEnemyStats(cfg, state);
          state.phase = "playing";
          state.time = cfg.matchTime;
          state.playerHp = playerMaxHp;
          state.enemyHp = enemy.maxHp;
          state.lastHeard = "-";
          state.accepted = "-";
          state.enemyAccepted = "-";
          state.playerState = "Ready";
          state.enemyState = "Ready";
          state.message = `Stage ${state.stage}: ${enemy.name} approaches.`;
          state.note = "Voice commands use one full English word. Mic on disables manual combat controls.";
          state.result = "";
          state.battleOutcome = null;
          state.paused = false;
          state.pauseStartedAt = 0;
          state.pauseRenderNow = 0;
          state.frenzyTimer = 0;
          initializeCombatCooldowns();
          state.defenceTimer = 0;
          state.blockTimer = 0;
          state.enemyTimer = rand(enemy.minWait, enemy.maxWait);
          state.shake = 0;
          state.particles = [];
          state.pendingAttacks = [];
          log("reset");
        }

        function playNow() {
          if (state.phase !== "menu") return;
          state.phase = "select";
          state.message = "Choose your dragon.";
          state.note = "Select a dragon, then confirm to battle.";
          state.playerState = "Choose";
          log("play_now");
        }

        function openTutorial() {
          if (state.phase !== "menu") return;
          state.phase = "tutorial";
          state.tutorialStep = 0;
          state.tutorialComplete = false;
          state.message = "Welcome to Dragon Fighter.";
          state.note = "Next explains the basics.";
          log("tutorial_open");
        }

        function completeTutorial() {
          state.tutorialComplete = true;
          state.phase = "menu";
          state.message = cfg.flow.labels.title;
          state.note = cfg.flow.labels.subtitle;
          saveTutorialCompleted(cfg);
          log("tutorial_complete");
        }

        function nextTutorialStep() {
          if (state.phase !== "tutorial") return;
          if (state.tutorialStep >= cfg.flow.tutorial.steps.length - 1) {
            completeTutorial();
            return;
          }
          state.tutorialStep += 1;
          state.message = cfg.flow.tutorial.steps[state.tutorialStep].title;
          state.note = "Next continues, Skip closes the tutorial.";
          log("tutorial_next", { step: state.tutorialStep });
        }

        function previousTutorialStep() {
          if (state.phase !== "tutorial" || state.tutorialStep <= 0) return;
          state.tutorialStep -= 1;
          state.message = cfg.flow.tutorial.steps[state.tutorialStep].title;
          state.note = "Back returns to the previous tip.";
          log("tutorial_back", { step: state.tutorialStep });
        }

        function backToMainMenu() {
          micRequested = false;
          clearTimeout(recognitionRestartTimer);
          stopVoiceScanner();
          if (listening && recognition) recognition.stop();
          Object.assign(state, createInitialState(cfg));
          state.phase = "menu";
          state.tutorialComplete = true;
          state.message = cfg.flow.labels.title;
          state.note = cfg.flow.labels.subtitle;
          log("back_to_main_menu");
        }

        function pauseMatch() {
          if (state.phase !== "playing" || state.paused) return;
          state.paused = true;
          state.pauseStartedAt = performance.now();
          state.pauseRenderNow = state.pauseStartedAt;
          clearVoiceCommandQueue();
          state.message = "Match paused.";
          state.note = "Resume, retry this match, or return to Main Menu.";
          log("pause_match");
        }

        function resumeMatch() {
          if (state.phase !== "playing" || !state.paused) return;
          state.paused = false;
          state.pauseStartedAt = 0;
          state.pauseRenderNow = 0;
          state.message = "Match resumed.";
          state.note = "Battle continues.";
          log("resume_match");
        }

        function retryPausedMatch() {
          if (state.phase !== "playing" || !state.paused) return;
          const dragonId = state.selectedDragonId;
          const stage = state.stage;
          const upgrades = { ...state.upgrades };
          state.selectedDragonId = dragonId;
          state.stage = stage;
          state.upgrades = upgrades;
          reset();
          state.message = `Retrying Stage ${state.stage}.`;
          state.note = "Same setup restored from the pause menu.";
          log("pause_retry_match", { dragonId, stage });
        }

        function chooseDragonAgain() {
          clearVoiceCommandQueue();
          state.confirmChangeDragon = false;
          state.phase = "select";
          state.selectedDragonId = null;
          state.stage = 1;
          state.victories = 0;
          state.battleOutcome = null;
          state.upgrades = { power: 0, vitality: 0, guard: 0, focus: 0 };
          state.time = cfg.matchTime;
          state.playerHp = cfg.maxHp;
          state.enemyHp = cfg.maxHp;
          state.lastHeard = "-";
          state.accepted = "-";
          state.enemyAccepted = "-";
          state.playerState = "Choose";
          state.enemyState = "Ready";
          state.message = "Choose your dragon.";
          state.note = "Select a dragon, then confirm to battle.";
          state.result = "";
          state.paused = false;
          state.pauseStartedAt = 0;
          state.pauseRenderNow = 0;
          state.frenzyTimer = 0;
          state.cd.attack = 0;
          state.cd.defence = 0;
          state.cd.block = 0;
          state.cd.ultimate = 0;
          state.defenceTimer = 0;
          state.blockTimer = 0;
          state.enemyTimer = rand(cfg.enemyMinWait, cfg.enemyMaxWait);
          state.shake = 0;
          state.particles = [];
          state.pendingAttacks = [];
          log("choose_dragon_again");
        }

        function requestChangeDragonConfirmation() {
          if (state.phase !== "upgrade") return;
          state.confirmChangeDragon = true;
          state.note = "Confirm before changing dragon.";
          log("change_dragon_confirm_open");
        }

        function cancelChangeDragonConfirmation() {
          if (!state.confirmChangeDragon) return;
          state.confirmChangeDragon = false;
          state.note = "Choose one upgrade for your dragon.";
          log("change_dragon_confirm_cancel");
        }

        function confirmChangeDragon() {
          if (!state.confirmChangeDragon) return;
          log("change_dragon_confirm_yes");
          chooseDragonAgain();
        }

        function normalize(text) {
          return String(text || "")
            .toLowerCase()
            .replace(/[.,!?;:]/g, " ")
            .replace(/\s+/g, " ")
            .trim();
        }

        function commandFromWord(word) {
          if (word === "attack") return "attack";
          if (word === "block") return "block";
          if (word === "defence" || word === "defense") return "defence";
          if (word === "ultimate" || word === "skill") return "ultimate";
          return null;
        }

        function commandsFromSpeech(text) {
          return normalize(text)
            .split(" ")
            .map(commandFromWord)
            .filter(Boolean);
        }

        function commandFromSpeech(text) {
          const words = normalize(text).split(" ").filter(Boolean);
          if (words.length !== 1) return null;
          return commandFromWord(words[0]);
        }

        function commandFromKey(key) {
          const normalizedKey = String(key || "").toLowerCase();
          return Object.entries(cfg.combatKeys).find(([, mappedKey]) => mappedKey === normalizedKey)?.[0] || null;
        }

        function combatKeyHintText() {
          return `Q Attack | W Defence | E Block | R Skill`;
        }

        function clearVoiceCommandQueue() {
          voiceCommandQueue.length = 0;
        }

        function processVoiceTick() {
          log("voice_tick", { active: micRequested, phase: state.phase });
        }

        function flushVoiceCommandQueue() {
          const commands = voiceCommandQueue.splice(0);
          if (!micRequested || state.phase !== "playing") {
            if (commands.length) log("voice_window_discarded", { commands, phase: state.phase });
            return [];
          }

          commands.forEach((command) => useCommand(command, "voice"));
          if (commands.length) {
            state.note = `Voice window: ${commands.map((command) => command.toUpperCase()).join(" → ")}`;
            log("voice_window_executed", { commands });
          }
          return commands;
        }

        function startVoiceScanner() {
          if (voiceScanTimer !== null) return;
          voiceScanTimer = setInterval(processVoiceTick, cfg.voice.scanIntervalMs);
        }

        function stopVoiceScanner() {
          if (voiceScanTimer !== null) clearInterval(voiceScanTimer);
          voiceScanTimer = null;
          clearVoiceCommandQueue();
        }

        function manualCombatInputDisabled() {
          return micRequested || state.paused;
        }

        function processRecognizedCommand(command, signature = command, now = performance.now()) {
          if (!micRequested || state.phase !== "playing" || state.paused || !command) return false;
          const duplicate = signature === lastVoiceCommand.signature && now - lastVoiceCommand.at < cfg.voice.duplicateWindowMs;
          if (duplicate) {
            log("voice_duplicate_ignored", { command });
            return false;
          }
          lastVoiceCommand = { signature, at: now };
          const ready = state.cd[command] <= 0;
          useCommand(command, "voice");
          state.note = ready
            ? `Voice cast: ${command.toUpperCase()}`
            : `Voice heard ${command.toUpperCase()}; cooldown ${state.cd[command].toFixed(1)}s`;
          log("voice_command_processed", { command, ready });
          return ready;
        }

        function confirmDragon() {
          const dragon = core.getSelectedDragon(cfg, state);
          if (!dragon) {
            state.note = "Pick a dragon first.";
            return;
          }
          reset();
          state.message = `${dragon.name} enters Stage ${state.stage}.`;
          state.playerState = dragon.role;
          log("dragon_confirmed", { dragonId: dragon.id, role: dragon.role });
        }

        function getProjectileProfileId(source, command) {
          if (command === "ultimate") return cfg.projectiles.ultimateProfile;
          if (source === "enemy") return cfg.projectiles.enemyProfile;
          return cfg.projectiles.playerByDragon[state.selectedDragonId] || cfg.projectiles.enemyProfile;
        }

        function scheduleAttack(source, target, command, damage, color, size) {
          const sourceLayout = source === "player" ? cfg.battleLayout.playerDragon : cfg.battleLayout.enemyDragon;
          const targetLayout = target === "player" ? cfg.battleLayout.playerDragon : cfg.battleLayout.enemyDragon;
          state.pendingAttacks.push({
            source,
            target,
            command,
            damage,
            color,
            size,
            projectileProfileId: getProjectileProfileId(source, command),
            assetKey: command === "ultimate" ? "projectileUltimate" : "projectileAttack",
            elapsed: 0,
            castTime: cfg.castWarningTime,
            travelTime: source === "enemy" ? cfg.enemyProjectileTravelTime : cfg.projectileTravelTime,
            startX: sourceLayout.hitX,
            startY: sourceLayout.hitY - 28,
            endX: targetLayout.hitX,
            endY: targetLayout.hitY - 18
          });
          hit(sourceLayout.hitX, sourceLayout.hitY - 28, color, command === "ultimate" ? 14 : 8);
        }

        function resolveAttack(attack) {
          const targetLayout = attack.target === "player" ? cfg.battleLayout.playerDragon : cfg.battleLayout.enemyDragon;
          const blocked = attack.target === "player" && state.blockTimer > 0;
          const defended = attack.target === "player" && state.defenceTimer > 0;

          if (blocked) {
            state.playerState = "Blocked";
            state.message = "Block negated all damage.";
            shield(targetLayout.hitX, targetLayout.hitY, "#f6c453", 22);
            hit(targetLayout.hitX, targetLayout.hitY, "#f6c453", 10);
            log("attack_blocked", { command: attack.command, source: attack.source });
            return;
          }

          const damage = attack.target === "player" && defended ? Math.round(attack.damage * cfg.defenceReduce) : attack.damage;

          if (attack.target === "player") {
            state.playerHp = clamp(state.playerHp - damage, 0, core.getPlayerMaxHp(cfg, state));
            state.playerState = defended ? "Defended" : "Hit";
            state.message = defended ? `Defence reduced damage. You -${damage} HP` : `Enemy hit. You -${damage} HP`;
          } else {
            state.enemyHp = clamp(state.enemyHp - damage, 0, core.getEnemyStats(cfg, state).maxHp);
            state.enemyState = attack.command === "ultimate" ? "Crushed" : "Hit";
            state.message = attack.command === "ultimate" ? `Ultimate hit. Enemy -${damage} HP` : `Attack hit. Enemy -${damage} HP`;
          }

          hit(targetLayout.hitX, targetLayout.hitY, attack.color, attack.command === "ultimate" ? 40 : 18);
          state.shake = attack.command === "ultimate" ? 0.3 : 0.16;
          log("attack_impact", { command: attack.command, source: attack.source, target: attack.target, damage, defended });
          checkEnd();
        }

        function useCommand(cmd, source = "button") {
          if (state.phase !== "playing") return;
          if (state.paused) {
            log("paused_command_ignored", { cmd, source });
            return;
          }
          if (source !== "voice" && manualCombatInputDisabled()) {
            state.message = "Manual combat controls are disabled while mic is on.";
            state.note = "Use voice commands or stop the mic to use buttons and keys.";
            log("manual_command_blocked", { cmd, source });
            return;
          }

          state.accepted = cmd.toUpperCase();
          log("command", { cmd, source });

          if (state.cd[cmd] > 0) {
            state.message = `${cmd.toUpperCase()} cooldown: ${state.cd[cmd].toFixed(1)}s`;
            state.playerState = "Cooldown";
            return;
          }

          if (cmd === "attack") {
            const damage = core.modifiedAttackDamage(cfg, state);
            state.cd.attack = core.getCommandCooldown(cfg, state, "attack");
            state.playerState = "Attack Cast";
            state.enemyState = "Incoming";
            state.message = "Attack charging. Projectile incoming.";
            scheduleAttack("player", "enemy", "attack", damage, "#fb923c", 18);
          }

          if (cmd === "defence") {
            const duration = core.modifiedDefenceDuration(cfg, state);
            state.cd.defence = core.getCommandCooldown(cfg, state, "defence");
            state.defenceTimer = duration;
            state.playerState = "Defence";
            state.message = `Defence shield active for ${duration.toFixed(1)} seconds`;
            shield(cfg.battleLayout.playerDragon.hitX, cfg.battleLayout.playerDragon.hitY, "#60a5fa", 28);
          }

          if (cmd === "block") {
            state.cd.block = core.getCommandCooldown(cfg, state, "block");
            state.blockTimer = cfg.blockActiveTime;
            state.playerState = "Block";
            state.message = `Block active for ${cfg.blockActiveTime.toFixed(1)} seconds`;
            shield(cfg.battleLayout.playerDragon.hitX, cfg.battleLayout.playerDragon.hitY, "#f6c453", 18);
          }

          if (cmd === "ultimate") {
            state.cd.ultimate = core.getCommandCooldown(cfg, state, "ultimate");
            state.playerState = "Ultimate Cast";
            state.enemyState = "Danger";
            state.message = "Ultimate charging. Heavy projectile incoming.";
            scheduleAttack("player", "enemy", "ultimate", core.modifiedUltimateDamage(cfg, state), "#a78bfa", 32);
          }
        }

        function startRecognition() {
          if (!recognition || listening || !micRequested) return;

          try {
            recognition.start();
          } catch (e) {
            state.note = "Microphone is busy. Retrying...";
            clearTimeout(recognitionRestartTimer);
            recognitionRestartTimer = setTimeout(startRecognition, 350);
          }
        }

        function toggleMic() {
          if (!recognition) {
            state.note = "This browser does not support Web Speech API. Use canvas buttons or Q/W/E/R.";
            return;
          }

          if (micRequested) {
            micRequested = false;
            clearTimeout(recognitionRestartTimer);
            stopVoiceScanner();
            if (listening) recognition.stop();
            else state.note = "Mic is off. Press Start Mic to listen again.";
            return;
          }

          micRequested = true;
          speechError = "";
          startVoiceScanner();
          startRecognition();
        }

        function enemyAttack() {
          if (state.phase !== "playing" || state.paused) return;
          const enemy = core.getEnemyStats(cfg, state);

          state.enemyState = "Attack Cast";
          state.enemyAccepted = "ATTACK";
          state.playerState = state.blockTimer > 0 ? "Block" : state.playerState;
          state.message = "Enemy attack charging. Block before impact.";
          scheduleAttack("enemy", "player", "attack", enemy.damage, enemy.color, 18 + Math.min(8, state.stage - 1));
          state.enemyTimer = rand(enemy.minWait, enemy.maxWait);
          log("enemy_attack_cast");
        }

        function checkEnd() {
          if (state.playerHp <= 0 && state.enemyHp <= 0) finish("DRAW");
          else if (state.enemyHp <= 0) finish("YOU WIN");
          else if (state.playerHp <= 0) finish("YOU LOSE");
          else if (state.time <= 0) {
            if (state.playerHp > state.enemyHp) finish("YOU WIN BY HP");
            else if (state.enemyHp > state.playerHp) finish("YOU LOSE BY HP");
            else finish("DRAW");
          }
        }

        function finish(result) {
          if (state.phase !== "playing" || state.paused) return;
          clearVoiceCommandQueue();
          const won = result.includes("WIN");
          state.phase = "result";
          state.result = result;
          state.battleOutcome = {
            result,
            won,
            stage: state.stage,
            setup: {
              selectedDragonId: state.selectedDragonId,
              stage: state.stage,
              upgrades: { ...state.upgrades }
            }
          };
          if (won) state.victories += 1;
          state.pendingAttacks = [];
          state.message = won ? `Stage ${state.stage} cleared.` : `Stage ${state.stage} holds.`;
          state.note = won ? cfg.flow.labels.continue : cfg.flow.labels.retryMatch;
          log("finish", { result, playerHp: state.playerHp, enemyHp: state.enemyHp });
        }

        function continueAfterWin() {
          if (state.phase !== "result" || !state.battleOutcome?.won) return;
          state.phase = "upgrade";
          state.message = `Stage ${state.stage} cleared. Choose an upgrade.`;
          state.note = "Choose one upgrade for your dragon.";
          log("continue_after_win", { stage: state.stage });
        }

        function retryLastBattle() {
          const setup = state.battleOutcome?.setup;
          if (state.phase !== "result" || state.battleOutcome?.won || !setup) return;
          state.selectedDragonId = setup.selectedDragonId;
          state.stage = setup.stage;
          state.upgrades = { ...setup.upgrades };
          reset();
          state.message = `Retrying Stage ${state.stage}. Adapt and overcome.`;
          state.note = "Previous dragon and upgrades restored.";
          log("retry_match", { dragonId: state.selectedDragonId, stage: state.stage });
        }

        function beginBattleAfterReward(rewardMessage) {
          const outcome = state.battleOutcome;
          if (!outcome) return;
          if (outcome.won) state.stage += 1;
          const nextMessage = outcome.won
            ? `Stage ${state.stage} begins. A stronger dragon appears.`
            : `Retrying Stage ${state.stage}. Adapt and overcome.`;
          reset();
          state.message = nextMessage;
          state.note = rewardMessage;
        }

        function applyUpgrade(upgradeId) {
          if (state.phase !== "upgrade" || !core.canApplyUpgrade(cfg, state, upgradeId)) return;
          const upgrade = core.getUpgrade(cfg, upgradeId);
          state.upgrades[upgradeId] += 1;
          const rank = state.upgrades[upgradeId];
          log("upgrade_applied", { upgradeId, rank, stage: state.stage });
          beginBattleAfterReward(`${upgrade.name} upgraded to rank ${rank}.`);
        }

        function continueWithMaxUpgrades() {
          if (state.phase !== "upgrade" || !core.allUpgradesMaxed(cfg, state)) return;
          beginBattleAfterReward("All upgrades are maxed.");
        }

        function hit(x, y, color, count) {
          for (let i = 0; i < count; i += 1) {
            state.particles.push({
              x,
              y,
              vx: rand(-180, 180),
              vy: rand(-150, 150),
              life: rand(0.35, 0.8),
              max: 0.8,
              size: rand(4, 10),
              color
            });
          }
        }

        function shield(x, y, color = "#60a5fa", count = 28) {
          for (let i = 0; i < count; i += 1) {
            const a = Math.PI * 2 * i / count;
            state.particles.push({
              x: x + Math.cos(a) * 58,
              y: y + Math.sin(a) * 58,
              vx: Math.cos(a) * 44,
              vy: Math.sin(a) * 44,
              life: 0.75,
              max: 0.75,
              size: 5,
              color
            });
          }
        }

        function update(dt) {
          if (state.paused) return;
          if (state.shake > 0) state.shake -= dt;
          if (state.frenzyTimer > 0) state.frenzyTimer = Math.max(0, state.frenzyTimer - dt);
          ["attack", "defence", "block", "ultimate"].forEach((k) => {
            state.cd[k] = Math.max(0, state.cd[k] - dt);
          });

          const defenceWasActive = state.defenceTimer > 0;
          const blockWasActive = state.blockTimer > 0;
          if (defenceWasActive) state.defenceTimer = Math.max(0, state.defenceTimer - dt);
          if (blockWasActive) state.blockTimer = Math.max(0, state.blockTimer - dt);
          if (blockWasActive && state.blockTimer === 0 && state.defenceTimer > 0) state.playerState = "Defence";
          if ((defenceWasActive || blockWasActive) && state.defenceTimer === 0 && state.blockTimer === 0 && ["Defence", "Defended", "Block", "Blocked"].includes(state.playerState)) {
            state.playerState = "Ready";
          }

          state.particles.forEach((p) => {
            p.life -= dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vx *= 0.98;
            p.vy *= 0.98;
          });
          state.particles = state.particles.filter((p) => p.life > 0);

          if (state.phase !== "playing") return;

          state.time = Math.max(0, state.time - dt);
          state.enemyTimer -= dt;

          state.pendingAttacks.forEach((attack) => {
            attack.elapsed += dt;
          });
          const impacting = state.pendingAttacks.filter((attack) => attack.elapsed >= attack.castTime + attack.travelTime);
          state.pendingAttacks = state.pendingAttacks.filter((attack) => attack.elapsed < attack.castTime + attack.travelTime);
          impacting.forEach((attack) => {
            if (state.phase === "playing") resolveAttack(attack);
          });

          if (state.phase !== "playing") return;
          if (state.enemyTimer <= 0) enemyAttack();
          if (state.time <= 0) checkEnd();
        }

        function rr(x, y, w, h, r, fill, stroke) {
          ctx.beginPath();
          ctx.roundRect(x, y, w, h, r);
          if (fill) {
            ctx.fillStyle = fill;
            ctx.fill();
          }
          if (stroke) {
            ctx.strokeStyle = stroke;
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        }

        function hpBar(x, y, w, h, value, maxValue, color, label) {
          rr(x, y, w, h, 10, "#0008", "#ffffff33");
          rr(x + 3, y + 3, (w - 6) * clamp(value / maxValue, 0, 1), h - 6, 8, color, null);
          ctx.textAlign = "center";
          ctx.fillStyle = "#fff4d6";
          ctx.font = "bold 16px system-ui";
          ctx.fillText(`${label}: ${Math.ceil(value)}/${maxValue}`, x + w / 2, y + h - 8);
          ctx.textAlign = "left";
        }

        function canvasButton(id, x, y, w, h, label, fill, border, disabled = false) {
          buttons.push({ id, x, y, w, h, disabled });
          ctx.save();
          rr(x, y, w, h, 18, fill, border);
          ctx.textAlign = "center";
          ctx.fillStyle = disabled ? "#94a3b8" : "#fff4d6";
          ctx.font = "bold 15px system-ui";
          ctx.fillText(label, x + w / 2, y + 27);
          ctx.restore();
        }

        function drawControls() {
          const centerX = cfg.viewport.centerX;
          if (state.phase === "tutorial") {
            buttons.length = 0;
            const tutorial = cfg.flow.tutorial;
            const lastStep = state.tutorialStep >= tutorial.steps.length - 1;
            if (!lastStep) {
              canvasButton("tutorialSkip", tutorial.skipButton.x, tutorial.skipButton.y, tutorial.skipButton.w, tutorial.skipButton.h, "Skip", "#102a4cdd", "#87d5ff");
            }
            if (state.tutorialStep > 0) {
              canvasButton("tutorialBack", tutorial.backButton.x, tutorial.backButton.y, tutorial.backButton.w, tutorial.backButton.h, "Back", "#102a4cdd", "#87d5ff");
            }
            if (lastStep) {
              canvasButton("tutorialDone", tutorial.doneButton.x, tutorial.doneButton.y, tutorial.doneButton.w, tutorial.doneButton.h, "Done", "#164e35dd", "#34d399");
            } else {

        function wrapText(text, x, y, maxWidth, lineHeight) {
          const words = text.split(" ");
          let line = "";

            if (ctx.measureText(next).width > maxWidth && line) {
              ctx.fillText(line, x, y);
              line = word;
              y += lineHeight;
            } else {
              line = next;
            }
          });
          if (line) ctx.fillText(line, x, y);
        }

          ctx.beginPath();
          ctx.ellipse(0, 72, 92, 23, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = wing;
          ctx.strokeStyle = "#0008";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(-25, 5);
          ctx.lineTo(-115, -70);
          ctx.lineTo(-85, 35);
          ctx.closePath();
          ctx.moveTo(28, 5);
          ctx.lineTo(100, -55);
          ctx.lineTo(80, 35);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = body;
          ctx.beginPath();
          ctx.ellipse(0, 18, 55, 72, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.ellipse(50, -40, 48, 37, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = horn;
          ctx.beginPath();
          ctx.moveTo(34, -72);
          ctx.lineTo(14, -112);
          ctx.lineTo(55, -80);
          ctx.closePath();
          ctx.moveTo(68, -70);
          ctx.lineTo(98, -100);
          ctx.lineTo(82, -56);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#111827";
          ctx.beginPath();
          ctx.arc(66, -48, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        function drawGuardEffect(layout) {
          const blockActive = state.blockTimer > 0;
          const defenceActive = state.defenceTimer > 0;
          if (!blockActive && !defenceActive) return;

          const now = visualNow() / 1000;
          const color = blockActive ? "#f6c453" : "#60a5fa";
          const radius = Math.max(layout.w, layout.h) * (blockActive ? 0.56 : 0.5);
          const pulse = 1 + Math.sin(now * (blockActive ? 12 : 7)) * 0.025;

          ctx.save();
          ctx.translate(layout.x, layout.y);
          ctx.scale(pulse, pulse);
          ctx.shadowColor = color;
          ctx.shadowBlur = blockActive ? 28 : 18;
          ctx.fillStyle = blockActive ? "#f6c45316" : "#60a5fa12";
          ctx.strokeStyle = color;
          ctx.lineWidth = blockActive ? 9 : 6;
          ctx.beginPath();
          if (blockActive) {
            for (let i = 0; i < 6; i += 1) {
              const angle = -Math.PI / 2 + i * Math.PI / 3;
              const px = Math.cos(angle) * radius;
              const py = Math.sin(angle) * radius * 0.7;
              if (i === 0) ctx.moveTo(px, py);
              else ctx.lineTo(px, py);
            }
            ctx.closePath();
          } else {
            ctx.ellipse(0, 0, radius, radius * 0.7, 0, 0, Math.PI * 2);
          }
          ctx.fill();
          ctx.stroke();

          if (!blockActive) {
            ctx.globalAlpha = 0.65;
            ctx.lineWidth = 3;
            ctx.setLineDash([20, 14]);
            ctx.lineDashOffset = -now * 36;
            ctx.beginPath();
            ctx.ellipse(0, 0, radius * 0.86, radius * 0.59, 0, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();

          const remaining = blockActive ? state.blockTimer : state.defenceTimer;
          ctx.save();
          ctx.textAlign = "center";
          ctx.font = "bold 15px system-ui";
          ctx.fillStyle = color;
          ctx.fillText(`${blockActive ? "BLOCK" : "DEFENCE"} ${remaining.toFixed(1)}s`, layout.x, layout.y + layout.h * 0.58);
          ctx.restore();
        }

        function drawEnemyTierAura(layout, enemy) {
          const now = visualNow() / 1000;
          const radius = Math.max(layout.w, layout.h) * 0.42 * enemy.scale;
          ctx.save();
          ctx.translate(layout.x, layout.y);
          ctx.globalAlpha = 0.28 + Math.sin(now * 4 + state.stage) * 0.08;
          ctx.strokeStyle = enemy.color;
          ctx.lineWidth = 5 + Math.min(7, state.stage * 0.6);
          ctx.shadowColor = enemy.color;
          ctx.shadowBlur = 24;
          ctx.beginPath();
          ctx.ellipse(0, 0, radius, radius * 0.62, 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 0.12;
          ctx.fillStyle = enemy.color;
          ctx.fill();
          ctx.restore();
        }

        function drawPendingAttack(attack) {
          const casting = attack.elapsed < attack.castTime;
          const sourcePulse = clamp(attack.elapsed / attack.castTime, 0, 1);

          if (casting) {
            ctx.save();
            ctx.globalAlpha = 0.45 + sourcePulse * 0.35;
            ctx.strokeStyle = attack.color;
            ctx.lineWidth = attack.command === "ultimate" ? 8 : 5;
            ctx.beginPath();
            ctx.arc(attack.startX, attack.startY, attack.size * (1.4 + sourcePulse), 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = attack.color;
            ctx.beginPath();
            ctx.arc(attack.startX, attack.startY, attack.size * 0.45, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            return;
          }

          const t = clamp((attack.elapsed - attack.castTime) / attack.travelTime, 0, 1);
          const x = attack.startX + (attack.endX - attack.startX) * t;
          const y = attack.startY + (attack.endY - attack.startY) * t;
          const radius = attack.size * (1 - t * 0.2);
          const angle = Math.atan2(attack.endY - attack.startY, attack.endX - attack.startX);
          const trailT = clamp(t - 0.18, 0, 1);
          const trailX = attack.startX + (attack.endX - attack.startX) * trailT;
          const trailY = attack.startY + (attack.endY - attack.startY) * trailT;

          ctx.save();
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = attack.color;
          ctx.lineWidth = radius * (attack.command === "ultimate" ? 1.15 : 0.72);
          ctx.lineCap = "round";
          ctx.shadowColor = attack.color;
          ctx.shadowBlur = 18;
          ctx.beginPath();
          ctx.moveTo(trailX, trailY);
          ctx.lineTo(x, y);
          ctx.stroke();
          ctx.restore();

          const profile = cfg.projectiles.profiles[attack.projectileProfileId];
          const pngProjectile = profile ? projectileImages[profile.assetKey] : null;
          if (pngProjectile) {
            const width = radius * profile.widthScale;
            const height = radius * profile.heightScale;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle + profile.baseRotation);
            ctx.shadowColor = attack.color;
            ctx.shadowBlur = attack.command === "ultimate" ? 24 : 14;
            ctx.drawImage(pngProjectile, -width * profile.headAnchorX, -height * profile.headAnchorY, width, height);
            ctx.restore();
            return;
          }

          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle);
          ctx.shadowColor = attack.color;
          ctx.shadowBlur = attack.command === "ultimate" ? 24 : 14;
          const projectile = images[attack.assetKey];
          if (projectile && projectile.complete && projectile.naturalWidth > 0) {
            ctx.drawImage(projectile, -radius * 2.5, -radius * 1.25, radius * 5, radius * 2.5);
          } else {
            ctx.fillStyle = attack.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, radius * 1.45, radius * 0.72, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fff7";
            ctx.beginPath();
            ctx.ellipse(radius * 0.25, -radius * 0.18, radius * 0.55, radius * 0.22, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }

        function drawArena() {
          const bg = images.background;
          const { width, height, centerX } = cfg.viewport;

          if (bg && bg.complete && bg.naturalWidth > 0 && bg.naturalHeight > 0) {
            const scale = Math.max(width / bg.naturalWidth, height / bg.naturalHeight);
            const sourceW = width / scale;
            const sourceH = height / scale;
            const sourceX = (bg.naturalWidth - sourceW) / 2;
            const sourceY = (bg.naturalHeight - sourceH) / 2;
            ctx.drawImage(bg, sourceX, sourceY, sourceW, sourceH, 0, 0, width, height);
            ctx.fillStyle = "#02061755";
            ctx.fillRect(0, 0, width, height);
            return;
          }

          const g = ctx.createLinearGradient(0, 0, 0, height);
          g.addColorStop(0, "#263a5b");
          g.addColorStop(0.6, "#17233a");
          g.addColorStop(1, "#0b1020");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, width, height);
          ctx.fillStyle = "#f6c45318";
          ctx.beginPath();
          ctx.ellipse(centerX, 350, 570, 115, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#f6c45355";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(centerX, 350, 580, 122, 0, 0, Math.PI * 2);
          ctx.stroke();
        }

        function draw() {
          if (state.phase === "tutorial") {
            drawTutorial();
            return;
          }
          if (state.phase === "menu") {
            drawMainMenu();
            return;
          }
          if (state.phase === "select") {
            drawDragonSelect();
            return;
          }
          if (state.phase === "upgrade") {
            drawUpgradeScreen();
            return;
          }

          ctx.save();
          if (state.shake > 0) ctx.translate(rand(-6, 6), rand(-5, 5));

          drawArena();
          const renderData = core.getBattleRenderData(cfg, state);
          const enemyStats = core.getEnemyStats(cfg, state);
          const playerMaxHp = core.getPlayerMaxHp(cfg, state);
          const layout = cfg.battleLayout;
          drawEnemyTierAura(layout.enemyDragon, enemyStats);
          drawDragonImage(renderData.enemy.assetKey, layout.enemyDragon.x, layout.enemyDragon.y, layout.enemyDragon.w * enemyStats.scale, layout.enemyDragon.h * enemyStats.scale, renderData.enemy.flip);
          drawDragonImage(renderData.player.assetKey, layout.playerDragon.x, layout.playerDragon.y, layout.playerDragon.w, layout.playerDragon.h, renderData.player.flip);
          drawGuardEffect(layout.playerDragon);
          state.pendingAttacks.forEach(drawPendingAttack);

          state.particles.forEach((p) => {
            ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          });

          const upgradeRanks = Object.values(state.upgrades).reduce((sum, rank) => sum + rank, 0);
          drawStatusPanel(layout.playerHud, `P1 ${renderData.player.name}`, `${renderData.player.role} • Upgrades ${upgradeRanks}`, state.playerHp, playerMaxHp, "#34d399", state.selectedDragonId);
          drawStatusPanel(layout.enemyHud, `P2 ${renderData.enemy.name}`, `${renderData.enemy.role} • DMG ${enemyStats.damage}`, state.enemyHp, enemyStats.maxHp, enemyStats.color, renderData.enemy.elementKey);
          drawPanelCooldowns(layout.playerHud, "player");
          drawPanelCooldowns(layout.enemyHud, "enemy");

          rr(layout.timer.x, layout.timer.y, layout.timer.w, layout.timer.h, 18, "#07101de0", "#f6c45388");
          ctx.textAlign = "center";
          ctx.fillStyle = "#f6c453";
          ctx.font = "bold 17px system-ui";
          ctx.fillText(`STAGE ${state.stage}`, layout.timer.x + layout.timer.w / 2, layout.timer.y + 27);
          ctx.font = "bold 32px system-ui";
          ctx.fillText(String(Math.ceil(state.time)), layout.timer.x + layout.timer.w / 2, layout.timer.y + 62);
          ctx.textAlign = "left";

          drawStateLabel(state.enemyState, layout.enemyDragon.x, layout.enemyDragon.labelY);
          drawStateLabel(state.playerState, layout.playerDragon.x, layout.playerDragon.labelY);

          ctx.fillStyle = listening ? "#34d399" : micRequested ? "#f6c453" : "#fca5a5";
          ctx.font = "bold 16px system-ui";
          ctx.fillText(listening ? "Mic listening - 0.5s check" : micRequested ? "Mic reconnecting" : "Mic off", layout.mic.x, layout.mic.y);

          rr(layout.message.x, layout.message.y, layout.message.w, layout.message.h, 18, "#07101dd9", "#f6c45366");
          ctx.textAlign = "center";
          ctx.fillStyle = "#fff4d6";
          ctx.font = "bold 21px system-ui";
          ctx.fillText(state.message, layout.message.textX, layout.message.textY);
          ctx.textAlign = "left";

          drawCommandPanel(layout.playerCommand, "P1 COMMAND", state.accepted, "left");
          drawCommandPanel(layout.commandReference, "COMMANDS - ONE FULL WORD", combatKeyHintText());
          drawCommandPanel(layout.enemyCommand, "P2 / AI COMMAND", state.enemyAccepted, "right");

          if (state.phase === "result") drawResultOverlay();
          if (state.paused) drawPauseOverlay();

          drawControls();

          ctx.restore();
        }

        function loop(now) {
          const dt = Math.min(0.033, (now - last) / 1000);
          last = now;
          update(dt);
          draw();
          requestAnimationFrame(loop);
        }

        function setupSpeech() {
          if (!SpeechRecognition) {
            if (state.phase !== "tutorial") state.note = "This browser does not support Web Speech API. Use canvas buttons or Q/W/E/R.";
            return;
          }

          recognition = new SpeechRecognition();
          recognition.lang = cfg.voice.language;
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.maxAlternatives = 3;

          recognition.onstart = () => {
            listening = true;
            speechError = "";
            startVoiceScanner();
            state.note = "Listening. Say one full command word in English.";
            log("mic_start");
          };

          recognition.onend = () => {
            listening = false;
            if (micRequested) {
              state.note = speechError || "Reconnecting microphone...";
              clearTimeout(recognitionRestartTimer);
              recognitionRestartTimer = setTimeout(startRecognition, 250);
            } else if (!speechError) {
              state.note = "Mic is off. Press Start Mic to listen again.";
            }
            log("mic_end");
          };

          recognition.onerror = (e) => {
            const fatal = ["not-allowed", "service-not-allowed", "audio-capture"].includes(e.error);
            if (fatal) {
              micRequested = false;
              stopVoiceScanner();
            }
            speechError = e.error === "no-speech"
              ? "No speech heard. Microphone will keep listening."
              : e.error === "aborted" && !micRequested
                ? "Mic is off. Press Start Mic to listen again."
                : `Mic error: ${e.error}. Use canvas buttons or Q/W/E/R.`;
            state.note = speechError;
            log("mic_error", { error: e.error });
          };

          recognition.onresult = (e) => {
            if (!micRequested) return;

            for (let i = e.resultIndex; i < e.results.length; i += 1) {
              const alternatives = Array.from(e.results[i]).map((alternative) => ({
                text: alternative.transcript,
                normalized: normalize(alternative.transcript),
                confidence: alternative.confidence,
                command: commandFromSpeech(alternative.transcript)
              }));
              const best = alternatives.reduce((selected, alternative) => {
                if (!selected) return alternative;
                if (Boolean(alternative.command) !== Boolean(selected.command)) {
                  return alternative.command ? alternative : selected;
                }
                return alternative.confidence > selected.confidence ? alternative : selected;
              }, null);
              state.lastHeard = best?.normalized || "-";

              if (e.results[i].isFinal) {
                const now = performance.now();
                const signature = `${best?.command || "unknown"}:${best?.normalized || ""}`;
                const duplicate = signature === lastVoiceCommand.signature && now - lastVoiceCommand.at < cfg.voice.duplicateWindowMs;
                log("speech_final", { alternatives, command: best?.command || null, duplicate });

                if (!duplicate && best?.command && state.phase === "playing") {
                  processRecognizedCommand(best.command, signature, now);
                } else if (!duplicate && state.phase === "playing") {
                  state.message = "Not recognized. Say one full word: Attack, Defence, Block, Ultimate, or Skill.";
                }
                continue;
              }

              if (e.results[i].isFinal) {
                const now = performance.now();
                const signature = `${best?.commands.join(",") || "unknown"}:${best?.normalized || ""}`;
                const duplicate = signature === lastVoiceCommand.signature && now - lastVoiceCommand.at < cfg.voice.duplicateWindowMs;
                log("speech_final", { alternatives, commands: best?.commands || [], duplicate });

                if (duplicate) continue;
                lastVoiceCommand = { signature, at: now };
                if (best?.commands.length && state.phase === "playing") {
                  voiceCommandQueue.push(...best.commands);
                  state.note = `Queued: ${best.commands.map((command) => command.toUpperCase()).join(" → ")}`;
                } else if (!best?.commands.length && state.phase === "playing") {
                  state.message = "Not recognized. Say Attack, Defence, Block, Ultimate, or Skill.";
                }
              }
            }
          };

          if (state.phase !== "tutorial") state.note = "Voice is supported. Say one full English command word.";
        }

        canvas.addEventListener("pointerup", (e) => {
          const rect = canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;
          const x = (e.clientX - rect.left) * scaleX;
          const y = (e.clientY - rect.top) * scaleY;
          const button = buttons.find((item) => x >= item.x && x <= item.x + item.w && y >= item.y && y <= item.y + item.h);

          if (!button || button.disabled) return;
          if (button.id === "tutorialNext") {
            nextTutorialStep();
            return;
          }
          if (button.id === "tutorialBack") {
            previousTutorialStep();
            return;
          }
          if (button.id === "tutorialSkip" || button.id === "tutorialDone") {
            completeTutorial();
            return;
          }
          if (button.id === "playNow") {
            playNow();
            return;
          }
          if (button.id === "openTutorial") {
            openTutorial();
            return;
          }
          if (button.id === "pauseMatch") {
            pauseMatch();
            return;
          }
          if (button.id === "resumeMatch") {
            resumeMatch();
            return;
          }
          if (button.id === "retryPausedMatch") {
            retryPausedMatch();
            return;
          }
          if (button.id === "retryMatch") {
            retryLastBattle();
            return;
          }
          if (button.id === "backToMainMenu") {
            backToMainMenu();
            return;
          }
          if (button.id === "cancelChangeDragon") {
            cancelChangeDragonConfirmation();
            return;
          }
          if (button.id === "confirmChangeDragon") {
            confirmChangeDragon();
            return;
          }
          if (button.id === "continueAfterWin") {
            continueAfterWin();
            return;
          }
          if (button.id.startsWith("upgrade:")) {
            applyUpgrade(button.id.slice("upgrade:".length));
            return;
          }
          if (button.id === "continueMax") {
            continueWithMaxUpgrades();
            return;
          }
          if (button.id.startsWith("select:")) {
            state.selectedDragonId = button.id.slice("select:".length);
            const dragon = core.getSelectedDragon(cfg, state);
            state.message = `${dragon.name} selected.`;
            state.note = `${dragon.role}: Attack x${dragon.modifiers.attackDamage}, Defence x${dragon.modifiers.defenceDuration}, Skill x${dragon.modifiers.skillCooldown}`;
          }
          if (button.id === "confirmDragon") confirmDragon();
          if (button.id === "mic") toggleMic();
          if (button.id === "attack") useCommand("attack", "canvas");
          if (button.id === "defence") useCommand("defence", "canvas");
          if (button.id === "block") useCommand("block", "canvas");
          if (button.id === "ultimate") useCommand("ultimate", "canvas");
          if (button.id === "chooseDragonAgain") requestChangeDragonConfirmation();
        });

        window.addEventListener("keydown", (e) => {
          const k = e.key.toLowerCase();
          if (state.phase === "tutorial" && k === "enter") {
            nextTutorialStep();
            return;
          }
          if (state.phase === "tutorial" && k === "escape") {
            completeTutorial();
            return;
          }
          if (state.phase === "menu" && k === "enter") {
            playNow();
            return;
          }
          if (state.phase === "select" && k === "enter") confirmDragon();
          if (state.phase === "result" && state.battleOutcome?.won && k === "enter") {
            continueAfterWin();
            return;
          }
          if (state.phase === "upgrade" && ["1", "2", "3", "4"].includes(k)) {
            applyUpgrade(Object.keys(cfg.progression.upgrades)[Number(k) - 1]);
            return;
          }
          if (state.phase === "upgrade" && k === "enter") {
            continueWithMaxUpgrades();
            return;
          }
          if (state.paused && k === "escape") {
            resumeMatch();
            return;
          }
          if (state.phase === "playing" && !state.paused && k === "p") {
            pauseMatch();
            return;
          }
          const command = commandFromKey(k);
          if (command && !manualCombatInputDisabled()) useCommand(command, "keyboard");
        });

        window.DragonFighter = {
          CONFIG: cfg,
          state,
          core,
          playNow,
          openTutorial,
          nextTutorialStep,
          previousTutorialStep,
          completeTutorial,
          confirmDragon,
          pauseMatch,
          resumeMatch,
          retryPausedMatch,
          requestChangeDragonConfirmation,
          cancelChangeDragonConfirmation,
          confirmChangeDragon,
          finish,
          continueAfterWin,
          retryLastBattle,
          backToMainMenu,
          reset,
          update,
          toggleMic,
          useCommand,
          processRecognizedCommand,
          commandFromSpeech,
          commandFromKey,
          manualCombatInputDisabled,
          getRecognition: () => recognition,
          getButtons: () => buttons.slice(),
          draw
        };

        setupSpeech();
        requestAnimationFrame(loop);
      })();
    </script>
  </body>
</html>
